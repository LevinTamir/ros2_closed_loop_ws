# MoveIt sends the planned platform trajectory to the joint_state_transformer (treated as a
# FollowJointTrajectory controller); the transformer runs IK to the three motors and forwards to
# the actuated_joint_trajectory_controller in Gazebo. Action resolves to
# /joint_state_transformer/follow_joint_trajectory.
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - joint_state_transformer
  joint_state_transformer:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - platform_x
      - platform_y
      - platform_z
